<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Developer Apps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --card: #fffdf8;
      --text: #1f1c17;
      --muted: #6a6258;
      --line: #ddd5c8;
      --accent: #2c7a7b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f3efe7 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      padding: 32px 28px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(31, 28, 23, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.3;
    }

    p {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    a {
      display: block;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      background: #fffaf2;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    a:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Apps</h1>
    <p>Select an app.</p>

    <div class="links">
      <a href="https://naokiakita-jp.github.io/HabiDone-Privacy/">
        <strong>HabiDone</strong>
        Privacy Policy
      </a>
    </div>
  </main>
</body>
</html>
